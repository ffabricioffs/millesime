server:
  port: ${PORT:8081}
  forwarded-headers-strategy: framework
  error:
    include-message: always
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: true
        same-site: lax

spring:
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 3600
      chain:
        strategy:
          content:
            enabled: true
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:username}
    password: ${MAIL_PASSWORD:password}
    from: ${MAIL_FROM:no-reply@millesime.com.br}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: ${MAIL_HOST:smtp.example.com}

  sql:
    init:
      mode: always

logging:
  level:
    root: WARN
    com.example.Millesime: WARN
