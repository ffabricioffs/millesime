server:
  port: ${PORT:8081}
  forwarded-headers-strategy: framework
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: true
        same-site: lax

spring:
  datasource:
    platform: postgres
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      data-source-properties:
        sslmode: ${DB_SSL_MODE:require}
        ssl: ${DB_SSL:true}

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgresql.sql

logging:
  level:
    root: WARN
    com.example.Millesime: WARN
