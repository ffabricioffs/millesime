<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Vinhos - Millésime</title>
    <meta name="description" content="Explore nosso catálogo completo de vinhos premium selecionados com excelência.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body>
    <header th:replace="layout :: header"></header>

    <main>
        <section>
            <div class="container">
                <h1>Catálogo de Vinhos</h1>
                <p>Explore nossa seleção premium de vinhos do mundo</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div>
                    <aside class="catalog-filters">
                        <h3>Filtros</h3>
                        <form th:action="@{/catalogo}" method="get">
                            <div>
                                <h4>Tipo de Vinho</h4>
                                <div>
                                    <label><input type="radio" name="type" value="" th:checked="${#strings.isEmpty(selectedType)}"><span>Todos</span></label>
                                    <label><input type="radio" name="type" value="Tinto" th:checked="${selectedType == 'Tinto'}"><span>Tinto</span></label>
                                    <label><input type="radio" name="type" value="Branco" th:checked="${selectedType == 'Branco'}"><span>Branco</span></label>
                                    <label><input type="radio" name="type" value="Rosé" th:checked="${selectedType == 'Rosé'}"><span>Rosé</span></label>
                                    <label><input type="radio" name="type" value="Espumante" th:checked="${selectedType == 'Espumante'}"><span>Espumante</span></label>
                                </div>
                            </div>
                            <div>
                                <h4>Faixa de Preço</h4>
                                <div>
                                    <label><input type="radio" name="preco" value="0-100" th:checked="${precoMin == 0 and precoMax == 100}"><span>Até R$ 100</span></label>
                                    <label><input type="radio" name="preco" value="100-300" th:checked="${precoMin == 100 and precoMax == 300}"><span>R$ 100 - R$ 300</span></label>
                                    <label><input type="radio" name="preco" value="300-500" th:checked="${precoMin == 300 and precoMax == 500}"><span>R$ 300 - R$ 500</span></label>
                                    <label><input type="radio" name="preco" value="500" th:checked="${precoMin == 500 and precoMax == null}"><span>Acima de R$ 500</span></label>
                                </div>
                            </div>
                            <div>
                                <h4>Ordenar</h4>
                                <select name="ordem">
                                    <option value="">Relevância</option>
                                    <option value="preco_asc" th:selected="${ordem == 'preco_asc'}">Preço: Menor para Maior</option>
                                    <option value="preco_desc" th:selected="${ordem == 'preco_desc'}">Preço: Maior para Menor</option>
                                    <option value="nome_asc" th:selected="${ordem == 'nome_asc'}">Nome A-Z</option>
                                    <option value="recentes" th:selected="${ordem == 'recentes'}">Mais Recentes</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-premium btn-full">Aplicar Filtros</button>
                            <a th:href="@{/catalogo}" class="btn-premium-outline btn-full btn-filter-clear">Limpar Filtros</a>
                        </form>
                    </aside>

                    <div id="product-grid">
                        <div>
                            <p>Mostrando <strong th:text="${produtos.size()}">0</strong> de <strong th:text="${totalCount}">0</strong> produtos</p>
                        </div>

                        <div class="grid">
                            <div th:each="produto : ${produtos}" class="card-elegant">
                                <div>
                                    <img th:src="${produto.imagem} ?: 'https://d2xsxph8kpxj0f.cloudfront.net/310519663123416043/oNXkmfyzsbDL4eZ2xjUHn9/wine-placeholder.webp'" alt="Vinho">
                                    <div class="badge-elegant" th:text="${produto.tipo}">Destaque</div>
                                </div>
                                <div>
                                    <h3 th:text="${produto.nome}">Vinho Premium</h3>
                                    <p th:text="${produto.regiao} + ' • ' + ${produto.pais}">Região • País</p>
                                    <div>
                                        <div th:text="'R$ ' + ${#numbers.formatDecimal(produto.preco, 1, 2)}">R$ 189,90</div>
                                        <a th:href="@{/produto/{id}(id=${produto.id})}" class="btn-premium btn-full btn-sm">Ver Detalhes</a>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="catalog-pagination">
                            <a th:if="${currentPage > 1}"
                               th:href="@{/catalogo(page=${currentPage - 1}, type=${selectedType}, preco=${param.preco}, ordem=${ordem})}"
                               class="btn-premium-outline">← Anterior</a>
                            <span th:each="pageNumber : ${#numbers.sequence(1, totalPages)}">
                                <a th:href="@{/catalogo(page=${pageNumber}, type=${selectedType}, preco=${param.preco}, ordem=${ordem})}"
                                   th:text="${pageNumber}"
                                   th:classappend="${pageNumber == currentPage} ? ' btn-premium' : ' btn-premium-outline'"></a>
                            </span>
                            <a th:if="${currentPage < totalPages}"
                               th:href="@{/catalogo(page=${currentPage + 1}, type=${selectedType}, preco=${param.preco}, ordem=${ordem})}"
                               class="btn-premium-outline">Próximo →</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer th:replace="layout :: footer"></footer>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/catalog.js}"></script>
</body>
</html>
