<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Millésime</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header th:replace="~{layout :: header}"></header>
    <main class="container section" style="text-align:center;padding:4rem 1rem;">
        <h1 th:text="${status} ?: 'Erro'"></h1>
        <p th:text="${error} ?: 'Ocorreu um erro inesperado.'"></p>
        <a th:href="@{/}" class="btn-premium-gold">Voltar para a página inicial</a>
    </main>
    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
