<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Millésime</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="container section">
        <h1 th:text="${status} ?: 'Erro'"></h1>
        <p th:text="${error} ?: 'Ocorreu um erro inesperado.'"></p>
        <p th:if="${message}" th:text="${message}"></p>
        <a th:href="@{/}" class="btn-premium-gold btn-full">Voltar para a página inicial</a>
    </main>
</body>
</html>
