<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Millésime</title>
    <meta name="description" content="Crie sua conta Millésime e receba recomendações exclusivas de vinhos premium.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <section class="section">
            <div class="container">
                <div class="section-title register-section-title">
                    <h2>Criar Conta</h2>
                    <div class="divider-gold"></div>
                    <p class="section-subtitle">Preencha seus dados para começar</p>
                </div>

                <div class="register-form-wrapper">
                    <div th:if="${error}" class="register-error-message" role="alert">
                        <span th:text="${error}"></span>
                    </div>

                    <form class="register-form" th:action="@{/register}" method="post" th:object="${clienteRegisterRequest}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="register-field">
                            <label for="fullName">Nome completo *</label>
                            <input id="fullName" type="text" th:field="*{nomeCompleto}" required minlength="3" autocomplete="name" placeholder="Seu nome completo">
                        </div>

                        <div class="register-field">
                            <label for="email">E-mail *</label>
                            <input id="email" type="email" th:field="*{email}" required autocomplete="email" placeholder="seuemail@exemplo.com">
                        </div>

                        <div class="register-field">
                            <label for="password">Senha *</label>
                            <input id="password" type="password" th:field="*{senha}" required minlength="12" autocomplete="new-password" placeholder="Mínimo 12 caracteres">
                        </div>

                        <div class="register-field">
                            <label for="confirmPassword">Confirmar senha *</label>
                            <input id="confirmPassword" name="confirmPassword" type="password" required minlength="12" autocomplete="new-password" placeholder="Repita sua senha">
                        </div>

                        <div class="register-field">
                            <label for="cpf">CPF *</label>
                            <input id="cpf" type="text" th:field="*{cpf}" required inputmode="numeric" pattern="[0-9]{3}\.?[0-9]{3}\.?[0-9]{3}-?[0-9]{2}" title="Formato: 000.000.000-00 ou apenas números" placeholder="000.000.000-00" autocomplete="off" maxlength="14">
                            <small class="register-field-hint">Formato obrigatório: 000.000.000-00</small>
                        </div>

                        <div class="register-field">
                            <label for="birthDate">Data de nascimento *</label>
                            <input id="birthDate" type="date" th:field="*{dataNascimento}" required>
                        </div>

                        <div class="register-field">
                            <label for="phone">Telefone</label>
                            <input id="phone" type="tel" th:field="*{telefone}" inputmode="tel" placeholder="(11) 99999-9999" autocomplete="tel">
                        </div>

                        <div class="register-checkbox-group">
                            <label class="register-checkbox-label" for="acceptTerms">
                                <input id="acceptTerms" name="acceptTerms" type="checkbox" required>
                                <span>Li e aceito os termos e condições *</span>
                            </label>

                            <label class="register-checkbox-label" for="newsletter">
                                <input id="newsletter" type="checkbox" th:field="*{newsletter}">
                                <span>Desejo receber novidades e recomendações por e-mail</span>
                            </label>
                        </div>

                        <button type="submit" class="btn-premium-gold register-submit">Cadastrar</button>
                    </form>

                    <p class="register-login-link">
                        Já tem uma conta? <a th:href="@{/login}">Faça login</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/cpf-mask.js}"></script>
    <script th:src="@{/js/validacao-cpf.js}"></script>
    <script th:src="@{/js/validacao-senha.js}"></script>
    <script th:src="@{/js/register-preserve.js}"></script>
</body>
</html>
