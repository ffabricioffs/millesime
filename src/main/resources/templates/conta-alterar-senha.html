<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha - Millésime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
    <header th:replace="layout :: header"></header>

    <main>
        <section class="section">
            <div class="container">
                <div class="section-title register-section-title">
                    <h2>Alterar Senha</h2>
                    <div class="divider-gold"></div>
                </div>

                <div th:if="${success}" class="success-message">
                    <p th:text="${success}"></p>
                </div>
                <div th:if="${error}" class="error-message">
                    <p th:text="${error}"></p>
                </div>

                <div class="register-form-wrapper">
                    <form class="register-form" th:action="@{/conta/alterar-senha}" method="post" th:object="${alterarSenhaRequest}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="register-field">
                            <label for="senhaAtual">Senha Atual</label>
                            <input id="senhaAtual" type="password" th:field="*{senhaAtual}" required autocomplete="current-password" placeholder="Sua senha atual">
                        </div>

                        <div class="register-field">
                            <label for="novaSenha">Nova Senha</label>
                            <input id="novaSenha" type="password" th:field="*{novaSenha}" required minlength="12" autocomplete="new-password" placeholder="Mínimo 12 caracteres">
                            <small style="color:#888;font-size:0.8rem;">Mínimo 12 caracteres, com maiúscula, minúscula e número</small>
                        </div>

                        <div class="register-field">
                            <label for="confirmaSenha">Confirmar Nova Senha</label>
                            <input id="confirmaSenha" type="password" th:field="*{confirmaSenha}" required minlength="12" autocomplete="new-password" placeholder="Repita a nova senha">
                        </div>

                        <button type="submit" class="btn-premium-gold register-submit">Alterar Senha</button>
                    </form>

                    <a th:href="@{/conta/editar}" style="display:block;text-align:center;margin-top:1rem;color:#8b6914;">Voltar para Editar Perfil</a>
                </div>
            </div>
        </section>
    </main>

    <footer th:replace="layout :: footer"></footer>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
