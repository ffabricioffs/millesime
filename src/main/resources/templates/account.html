<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Minha Conta - Millésime</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header th:replace="layout :: header"></header>
    <main>
        <section class="container section">
            <h1>Minha Conta</h1>
            <div th:if="${session.clienteLogado == null}">
                <p>Para acessar sua conta, faça login ou cadastre-se caso ainda não tenha um usuário.</p>
                <div class="account-actions">
                    <a th:href="@{/login}" class="btn-premium-gold btn-full">Entrar</a>
                    <a th:href="@{/register}" class="btn-premium-gold btn-full">Criar Conta</a>
                </div>
            </div>
            <div th:if="${session.clienteLogado != null}">
                <p>Bem-vindo, <strong th:text="${session.clienteLogado.nomeCompleto}">Cliente</strong>.</p>
                <div class="account-details">
                    <p><strong>E-mail:</strong> <span th:text="${session.clienteLogado.email}"></span></p>
                    <p><strong>CPF:</strong> <span th:text="${session.clienteLogado.cpf}"></span></p>
                    <p><strong>Telefone:</strong> <span th:text="${session.clienteLogado.telefone}">-</span></p>
                    <p><strong>Newsletter:</strong> <span th:text="${session.clienteLogado.newsletter} ? 'Sim' : 'Não'"></span></p>
                    <p><strong>Data de cadastro:</strong> <span th:text="${session.clienteLogado.dataCadastroFormatada}"></span></p>
                </div>
                <div class="account-actions">
                    <a th:href="@{/conta/editar}" class="btn-premium-gold btn-full">Editar Perfil</a>
                    <a th:href="@{/meus-pedidos}" class="btn-premium-gold btn-full">Meus Pedidos</a>
                    <form th:action="@{/logout}" method="post" style="display:inline;width:100%;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn-premium-gold btn-full" style="width:100%;">Sair</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer th:replace="layout :: footer"></footer>
</body>
</html>
