<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetar Senha - Millésime</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header th:replace="~{layout :: header}"></header>
    <main class="container section">
        <section class="section">
            <div class="section-title register-section-title">
                <h2>Recuperar Senha</h2>
                <div class="divider-gold"></div>
                <p class="section-subtitle">Informe seu e-mail para receber o link de redefinição</p>
            </div>
            <div class="register-form-wrapper">
                <form th:action="@{/reset-password}" method="post" class="register-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="register-field">
                        <label for="email">E-mail</label>
                        <input id="email" name="email" type="email" required autocomplete="email" placeholder="seuemail@exemplo.com">
                    </div>
                    <button type="submit" class="btn-premium-gold register-submit">Enviar Link de Redefinição</button>
                </form>
                <div th:if="${message}" class="success-message">
                    <p th:text="${message}"></p>
                </div>
                <div th:if="${error}" class="error-message">
                    <p th:text="${error}"></p>
                </div>
            </div>
        </section>
    </main>
    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
