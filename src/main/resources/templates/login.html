<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Millésime</title>
    <meta name="description" content="Faça login na sua conta Millésime e acesse recomendações exclusivas de vinhos premium.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
    <header th:replace="layout :: header"></header>

    <main>
        <section class="section">
            <div class="container">
                <div class="section-title register-section-title">
                    <h2>Entrar</h2>
                    <div class="divider-gold"></div>
                    <p class="section-subtitle">Acesse sua conta Millésime</p>
                </div>

                <div class="register-form-wrapper">
                    <form class="register-form" th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div th:if="${loginError}" class="error-message">
                            <p th:text="${loginError}"></p>
                        </div>
                        <div th:if="${logoutMsg}" class="success-message">
                            <p th:text="${logoutMsg}"></p>
                        </div>
                        <div class="register-field">
                            <label for="username">E-mail</label>
                             <input id="username" name="username" type="email" required autocomplete="username" placeholder="seuemail@exemplo.com">
                        </div>

                        <div class="register-field">
                            <label for="password">Senha</label>
                            <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Digite sua senha">
                        </div>

                        <a th:href="@{/reset-password}" class="register-forgot-link">Esqueceu a senha?</a>

                        <button type="submit" class="btn-premium-gold register-submit">Entrar</button>
                    </form>

                    <p class="register-login-link">
                        Não tem uma conta? <a th:href="@{/register}">Criar Conta</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer th:replace="layout :: footer"></footer>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
