<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro realizado - Millésime</title>
    <meta name="description" content="Cadastro concluído com sucesso. Verifique seu e-mail para ativar sua conta Millésime.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <section class="section">
            <div class="container">
                <div class="success-wrapper">
                    <div class="success-icon" aria-hidden="true">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                    </div>

                    <h1 class="success-title">Cadastro realizado com sucesso!</h1>

                    <div class="divider-gold success-divider"></div>

                    <p class="success-message">
                        Enviamos um e-mail de confirmação para <strong th:text="${email}">usuario@email.com</strong>.
                    </p>

                    <p class="success-message">
                        Por favor, verifique sua caixa de entrada e clique no link para ativar sua conta.
                    </p>

                    <div class="success-actions">
                        <a th:href="@{/}" class="btn-premium-gold">Ir para a página inicial</a>
                        <a th:href="@{/login}" class="btn-premium-outline">Fazer login</a>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
