<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragmentos Admin</title>
</head>
<body>
    <nav th:fragment="sidebar" class="admin-sidebar">
        <div class="admin-sidebar-brand">
            <div class="admin-sidebar-logo">M</div>
            <span>Admin</span>
        </div>
        <a href="/admin" class="admin-sidebar-link">Dashboard</a>
        <a href="/admin/produtos" class="admin-sidebar-link">Produtos</a>
        <a href="/admin/pedidos" class="admin-sidebar-link">Pedidos</a>
        <a href="/admin/clientes" class="admin-sidebar-link">Clientes</a>
        <div class="admin-sidebar-footer">
            <a href="/" class="admin-sidebar-link">Ver Site</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="admin-sidebar-link" style="background:none;border:none;cursor:pointer;width:100%;text-align:left;">Sair</button>
            </form>
        </div>
    </nav>
</body>
</html>
