<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Pedidos - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <header th:replace="~{layout :: header}"></header>
    <main>
        <div class="admin-layout">
            <div th:replace="admin/layout :: sidebar"></div>
            <div class="admin-content">
                <h1 class="admin-page-title">Pedidos</h1>

                <div th:if="${success}" class="admin-alert admin-alert-success" th:text="${success}"></div>
                <div th:if="${error}" class="admin-alert admin-alert-error" th:text="${error}"></div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Data</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pedido : ${pedidos}">
                            <td th:text="${#strings.substring(pedido.id.toString(), 0, 8)} + '...'"></td>
                            <td th:text="${pedido.clienteNome}">Nome</td>
                            <td th:text="${pedido.dataFormatada}">01/01/2024</td>
                            <td>R$ <span th:text="${#numbers.formatDecimal(pedido.total, 1, 2)}">0,00</span></td>
                            <td><span class="admin-status" th:classappend="'admin-status-' + ${pedido.status.toLowerCase()}" th:text="${pedido.status}">PENDENTE</span></td>
                            <td>
                                <form th:action="@{/admin/pedidos/{id}/status(id=${pedido.id})}" method="post" style="display:flex;gap:0.25rem;align-items:center;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <select name="status" class="admin-select-sm">
                                        <option value="PENDENTE" th:selected="${pedido.status == 'PENDENTE'}">Pendente</option>
                                        <option value="CONFIRMADO" th:selected="${pedido.status == 'CONFIRMADO'}">Confirmado</option>
                                        <option value="ENVIADO" th:selected="${pedido.status == 'ENVIADO'}">Enviado</option>
                                        <option value="ENTREGUE" th:selected="${pedido.status == 'ENTREGUE'}">Entregue</option>
                                        <option value="CANCELADO" th:selected="${pedido.status == 'CANCELADO'}">Cancelado</option>
                                    </select>
                                    <button type="submit" class="admin-btn-sm">Atualizar</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pedidos)}">
                            <td colspan="6" style="text-align:center;padding:2rem;color:#888;">Nenhum pedido encontrado.</td>
                        </tr>
                    </tbody>
                </table>

                <div th:if="${totalPages > 1}" class="admin-pagination">
                    <a th:if="${currentPage > 1}" th:href="@{/admin/pedidos(page=${currentPage - 1})}" class="admin-page-link">« Anterior</a>
                    <span th:text="'Página ' + ${currentPage} + ' de ' + ${totalPages}" class="admin-page-info"></span>
                    <a th:if="${currentPage < totalPages}" th:href="@{/admin/pedidos(page=${currentPage + 1})}" class="admin-page-link">Próxima »</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
