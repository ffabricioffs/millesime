<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Produtos - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <header th:replace="layout :: header"></header>
    <main>
        <div class="admin-layout">
            <div th:replace="admin/layout :: sidebar"></div>
            <div class="admin-content">
                <div class="admin-header-bar">
                    <h1 class="admin-page-title">Produtos</h1>
                    <a href="/admin/produtos/novo" class="btn-premium-gold btn-sm">+ Novo Produto</a>
                </div>

                <div th:if="${success}" class="admin-alert admin-alert-success" th:text="${success}"></div>
                <div th:if="${error}" class="admin-alert admin-alert-error" th:text="${error}"></div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Ativo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="produto : ${produtos}">
                            <td th:text="${produto.nome}">Vinho Tinto</td>
                            <td th:text="${produto.tipo}">Tinto</td>
                            <td>R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 2)}">0,00</span></td>
                            <td th:text="${produto.estoque}">10</td>
                            <td>
                                <span th:if="${produto.ativo}" class="admin-status admin-status-ativo">Sim</span>
                                <span th:unless="${produto.ativo}" class="admin-status admin-status-inativo">Não</span>
                            </td>
                            <td class="admin-actions">
                                <a th:href="@{/admin/produtos/{id}/editar(id=${produto.id})}" class="admin-btn-sm">Editar</a>
                                <form th:action="@{/admin/produtos/{id}/deletar(id=${produto.id})}" method="post" style="display:inline;" class="form-deletar-produto">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="admin-btn-sm admin-btn-danger">Desativar</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(produtos)}">
                            <td colspan="6" style="text-align:center;padding:2rem;color:#888;">Nenhum produto encontrado.</td>
                        </tr>
                    </tbody>
                </table>

                <div th:if="${totalPages > 1}" class="admin-pagination">
                    <a th:if="${currentPage > 1}" th:href="@{/admin/produtos(page=${currentPage - 1})}" class="admin-page-link">« Anterior</a>
                    <span th:text="'Página ' + ${currentPage} + ' de ' + ${totalPages}" class="admin-page-info"></span>
                    <a th:if="${currentPage < totalPages}" th:href="@{/admin/produtos(page=${currentPage + 1})}" class="admin-page-link">Próxima »</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="layout :: footer"></footer>
    <script th:src="@{/js/admin-produto.js}"></script>
</body>
</html>
