<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Produto - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <header th:replace="layout :: header"></header>
    <main>
        <div class="admin-layout">
            <div th:replace="admin/layout :: sidebar"></div>
            <div class="admin-content">
                <h1 class="admin-page-title" th:text="${produto.id != null} ? 'Editar Produto' : 'Novo Produto'">Novo Produto</h1>

                <form th:action="${produto.id != null} ? @{/admin/produtos/{id}(id=${produto.id})} : @{/admin/produtos}" method="post" class="admin-form" th:object="${produto}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="admin-form-grid">
                        <div class="admin-form-group">
                            <label for="nome">Nome</label>
                            <input type="text" id="nome" th:field="*{nome}" required minlength="3" class="admin-input" />
                        </div>

                        <div class="admin-form-group">
                            <label for="tipo">Tipo</label>
                            <select id="tipo" th:field="*{tipo}" class="admin-input" required>
                                <option value="">Selecione...</option>
                                <option value="Tinto">Tinto</option>
                                <option value="Branco">Branco</option>
                                <option value="Rosé">Rosé</option>
                                <option value="Espumante">Espumante</option>
                            </select>
                        </div>

                        <div class="admin-form-group">
                            <label for="preco">Preço (R$)</label>
                            <input type="number" id="preco" th:field="*{preco}" step="0.01" min="0.01" required class="admin-input" />
                        </div>

                        <div class="admin-form-group">
                            <label for="estoque">Estoque</label>
                            <input type="number" id="estoque" th:field="*{estoque}" step="1" min="0" required class="admin-input" />
                        </div>

                        <div class="admin-form-group">
                            <label for="regiao">Região</label>
                            <input type="text" id="regiao" th:field="*{regiao}" class="admin-input" />
                        </div>

                        <div class="admin-form-group">
                            <label for="pais">País</label>
                            <input type="text" id="pais" th:field="*{pais}" class="admin-input" />
                        </div>

                        <div class="admin-form-group">
                            <label for="uva">Uva</label>
                            <input type="text" id="uva" th:field="*{uva}" class="admin-input" />
                        </div>

                        <div class="admin-form-group">
                            <label for="imagem">URL da Imagem</label>
                            <input type="url" id="imagem" th:field="*{imagem}" class="admin-input" />
                        </div>
                    </div>

                    <div class="admin-form-group admin-grid-full">
                        <label for="descricao">Descrição</label>
                        <textarea id="descricao" th:field="*{descricao}" rows="4" required minlength="10" class="admin-input"></textarea>
                    </div>

                    <div th:if="${produto.id != null}" class="admin-form-group admin-grid-full">
                        <label>
                            <input type="checkbox" th:field="*{ativo}" />
                            Produto ativo
                        </label>
                    </div>

                    <div class="admin-form-actions">
                        <button type="submit" class="btn-premium-gold" th:text="${produto.id != null} ? 'Salvar Alterações' : 'Criar Produto'">Salvar</button>
                        <a href="/admin/produtos" class="admin-btn-sm admin-ml-sm">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer th:replace="layout :: footer"></footer>
    <script th:src="@{/js/admin-produto.js}"></script>
</body>
</html>
