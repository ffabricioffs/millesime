<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Pedido Confirmado - Millésime</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header th:replace="layout :: header"></header>
    <main>
        <section class="section">
            <div class="container" style="text-align:center;max-width:600px;margin:0 auto;">
                <div style="font-size:4rem;margin-bottom:1rem;">&#10003;</div>
                <h2>Pedido Confirmado!</h2>
                <div class="divider-gold" style="margin:1rem auto;"></div>
                <p style="font-size:1.1rem;margin-bottom:2rem;">Seu pedido foi realizado com sucesso. Você receberá um e-mail com os detalhes da compra.</p>
                <p><strong>Número do Pedido:</strong> <span th:text="${#strings.substring(pedido.id.toString(), 0, 8)}">ABC12345</span></p>
                <p><strong>Total:</strong> <span th:text="'R$ ' + ${#numbers.formatDecimal(pedido.total, 1, 2)}">R$ 0,00</span></p>
                <p><strong>Status:</strong> <span th:text="${pedido.status}">PENDENTE</span></p>
                <div style="margin-top:2rem;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
                    <a th:href="@{/pedido/{id}(id=${pedido.id})}" class="btn-premium-gold">Ver Detalhes do Pedido</a>
                    <a th:href="@{/catalogo}" class="btn-premium" style="display:inline-block;padding:0.75rem 1.5rem;border:1px solid #c9a84c;color:#c9a84c;text-decoration:none;border-radius:4px;">Continuar Comprando</a>
                </div>
            </div>
        </section>
    </main>
    <footer th:replace="layout :: footer"></footer>
</body>
</html>
