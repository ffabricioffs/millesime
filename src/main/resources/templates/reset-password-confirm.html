<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Millésime</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header th:replace="layout :: header"></header>
    <main class="container section">
        <section class="section">
            <div class="section-title register-section-title">
                <h2>Redefinir Senha</h2>
                <div class="divider-gold"></div>
                <p class="section-subtitle">Digite sua nova senha para concluir a redefinição.</p>
            </div>
            <div class="register-form-wrapper">
                <form th:action="@{/reset-password/confirm}" method="post" class="register-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="token" th:value="${token}" />

                    <div class="register-field">
                        <label for="novaSenha">Nova Senha</label>
                        <input id="novaSenha" name="novaSenha" type="password" required placeholder="Digite sua nova senha">
                    </div>

                    <button type="submit" class="btn-premium-gold register-submit">Redefinir Senha</button>
                </form>

                <div th:if="${message}" class="success-message">
                    <p th:text="${message}"></p>
                </div>
                <div th:if="${error}" class="error-message">
                    <p th:text="${error}"></p>
                </div>
            </div>
        </section>
    </main>
    <footer th:replace="layout :: footer"></footer>
</body>
</html>
