# ========================================
# Millésime - Spring Boot Configuration
# ========================================

# Application Name
spring.application.name=Millesime

# Server Configuration
server.port=8888
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=31536000
spring.web.resources.chain.cache=true
spring.web.resources.chain.gzipped=true

# Logging
logging.level.root=INFO
logging.level.com.example.Millesime=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Locale
spring.web.locale=pt_BR
spring.web.locale-resolver=fixed

# Session Configuration
server.servlet.session.timeout=30m
spring.session.store-type=none

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Custom Properties
app.name=Millésime
app.version=1.0.0
app.description=Premium Wine Store with Neoclassic Elegant Design
app.contact.email=contato@millesime.com.br
app.contact.phone=+55 (11) 3000-0000
app.contact.address=São Paulo, SP - Brasil
